# @package agent
# ROVER hyperparameters used by the NeurIPS reproducibility configs.
_target_: agent.rover.RoverAgent
name: rover
obs_type: ???
obs_shape: ???
grayscale: ${grayscale}
action_shape: ???
lr_actor: 10
discount: ${discount}
lambda_reg: 1e-3
lr_T: 1e-3
batch_size: 1024
batch_size_actor: 5000
nstep: 1
lr_encoder: 1e-3
curl: false
embedding_sum_loss: 0.0
