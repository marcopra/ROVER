# @package agent
_target_: agent.maxent_discrete.MaxEntAgent
name: maxent
reward_free: ${reward_free}
obs_type: ??? # to be specified later
obs_shape: ??? # to be specified later
action_shape: ??? # to be specified later
device: ${device}
actor_lr: 1e-4
critic_lr: 1e-4
critic_target_tau: 0.01
update_every_steps: 2
use_tb: ${use_tb}
use_wandb: ${use_wandb}
num_expl_steps: ??? # to be specified later
hidden_dim: 1024
feature_dim: 50
eps_schedule: 0.25
nstep: 1
batch_size: 1024
init_critic: true
linear_actor: false
update_encoder: ${update_encoder}
update_actor_after_critic_steps: ${update_actor_after_critic_steps}

# MaxEnt reward: r(s) = scale / (p_hat(s) + eps), where p_hat is a KDE
# estimate of the state visitation density in the encoded observation space.
maxent_scale: 1.0
maxent_eps: 1e-3
maxent_bandwidth: 0.1
maxent_kernel: epanechnikov
maxent_pca_components: 32
maxent_rollout_steps: 300
maxent_rollout_every_steps: 5000
maxent_rollout_eval_mode: false
maxent_rollout_batch_size: 256
maxent_num_rollouts: 10
maxent_policy_weighting: uniform # [uniform, geometric]
maxent_geometric_gamma: 0.90
maxent_max_policies: 0 # 0 keeps all policy snapshots
maxent_log_reward: false
maxent_reward_clip: 0.0
non_episodic_intrinsic_returns: false
